# ScanPang Backend - Render.com Blueprint (DB 제거, Stateless)

services:
  - type: web
    name: scanpang-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_KEY
        value: scanpang-dev-key-2024
      - key: CORS_ORIGIN
        value: "*"
